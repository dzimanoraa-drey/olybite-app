<!DOCTYPE html>
<html>
<head>
  <title>OLYBITE</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app-container container">

  <!-- LOGIN -->
  <div id="login" class="screen">
    <h2 class="text-center mb-4">🍔 OLYBITE</h2>

    <input class="form-control mb-2" placeholder="Username">
    <input class="form-control mb-3" type="password" placeholder="Password">

    <button class="btn btn-primary w-100" onclick="showScreen('menu')">
      Login
    </button>
  </div>

  <!-- MENU -->
  <div id="menu" class="screen hidden">
    <h4 class="mb-3">Food Stalls</h4>
    <div id="stalls"></div>

    <button class="btn btn-success w-100 mt-3" onclick="showScreen('cart')">
      View Cart
    </button>
  </div>

  <!-- CART -->
  <div id="cart" class="screen hidden">
    <h4>Your Cart</h4>
    <div id="cartItems"></div>

    <h5>Total: $<span id="total">0</span></h5>

    <!-- 📱 Phone Input -->
    <input 
      id="phoneNumber" 
      class="form-control mt-2" 
      placeholder="Enter phone number (614XXXXXXXX)" 
    />

    <button class="btn btn-primary w-100 mt-3" onclick="checkout()">
      Checkout
    </button>
  </div>

  <!-- CONFIRMATION -->
  <div id="confirmation" class="screen hidden text-center">
    <h2>✅ Order Confirmed</h2>
    <p>Your order has been placed successfully!</p>

    <button class="btn btn-secondary" onclick="showScreen('menu')">
      Back to Menu
    </button>
  </div>

</div>

<!-- 📩 Fake SMS Popup -->
<div id="smsPopup" class="sms-popup hidden">
  <strong>📩 New Message</strong>
  <p id="smsText"></p>
</div>

<script src="script.js"></script>
</body>
</html>
